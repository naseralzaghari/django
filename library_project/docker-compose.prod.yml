version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: library_db_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=library_db
      - POSTGRES_USER=library_user
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library_network

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: library_web_prod
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 library_project.wsgi:application
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      - DEBUG=False
      - DATABASE_NAME=library_db
      - DATABASE_USER=library_user
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - library_network

  nginx:
    image: nginx:alpine
    container_name: library_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - library_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  library_network:
    driver: bridge
